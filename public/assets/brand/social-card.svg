<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Flash Flood Observatory social card</title>
  <desc id="desc">Social sharing image for the Flash Flood Observatory public dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06111b" />
      <stop offset="55%" stop-color="#091824" />
      <stop offset="100%" stop-color="#12151d" />
    </linearGradient>
    <radialGradient id="blueGlow" cx="20%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#46a7ff" stop-opacity="0.28" />
      <stop offset="70%" stop-color="#46a7ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="goldGlow" cx="92%" cy="8%" r="30%">
      <stop offset="0%" stop-color="#f7de5e" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#f7de5e" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(119,232,255,0.08)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#blueGlow)" />
  <rect width="1200" height="630" fill="url(#goldGlow)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <g transform="translate(78 88)">
    <text x="0" y="0" fill="#f7de5e" font-family="Avenir Next, Trebuchet MS, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="4.5">FLASH FLOOD OBSERVATORY</text>

    <text x="0" y="124" fill="#f4f8fb" font-family="Iowan Old Style, Baskerville, Palatino Linotype, serif" font-size="86" font-weight="600" letter-spacing="-2.6">
      <tspan x="0" dy="0">Flash Flood</tspan>
      <tspan x="0" dy="84">Observatory</tspan>
    </text>

    <text x="0" y="352" fill="#77e8ff" font-family="Iowan Old Style, Baskerville, Palatino Linotype, serif" font-size="88" font-weight="600" letter-spacing="-2.4">Boscastle, UK</text>

    <text x="0" y="508" fill="#97aab8" font-family="Avenir Next, Trebuchet MS, Segoe UI, sans-serif" font-size="25" font-weight="500">flashfloodobservatory.com</text>
  </g>

  <image href="site-mark.png" x="788" y="132" width="274" height="274" preserveAspectRatio="xMidYMid meet" />
</svg>
